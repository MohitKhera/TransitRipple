  .sidebar-content::-webkit-scrollbar-track { background: transparent; }
  .sidebar-content::-webkit-scrollbar-thumb { background: #1e3a4a; border-radius: 4px; }

  .station-card {

    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    border: 1px solid transparent;

  .station-card.selected { background: #0f2540; border-color: #2563eb; }
  .station-name { font-size: 13px; color: #cbd5e1; font-weight: 500; }
  .station-id { font-size: 11px; color: #475569; margin-top: 2px; }

    font-size: 12px; font-weight: 700;

  .prob-low { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .prob-mid { background: #2d1a00; color: #fbbf24; border: 1px solid #92400e; }
  .prob-high { background: #2d0a0a; color: #f87171; border: 1px solid #991b1b; }

function probColor(p) {
  if (p === null || p === undefined) return '#334155';
  if (p < 0.3) return '#22c55e';
  if (p < 0.6) return '#f59e0b';
  return '#ef4444';
}

function probClass(p) {
  if (p === null || p === undefined) return '';
  if (p < 0.3) return 'prob-low';
  if (p < 0.6) return 'prob-mid';
  return 'prob-high';
}

function App() {
  const [predictions, setPredictions] = useState({});
  const [status, setStatus] = useState('idle');
  const [lastUpdated, setLastUpdated] = useState(null);
  const [selectedStation, setSelectedStation] = useState(null);
  const [error, setError] = useState(null);
  const mapRef = useRef(null);
  const markersRef = useRef({});
  const mapInstanceRef = useRef(null);

  const fetchPredictions = useCallback(async () => {
    setStatus('loading');
    setError(null);
    try {
      const stationIds = STATIONS.map(s => s.id);
      const res = await fetch(`${API_URL}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stations: stationIds })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const predMap = {};
      data.predictions.forEach(p => { predMap[p.station_id] = p.delay_probability; });
      setPredictions(predMap);
      setLastUpdated(new Date());
      setStatus('ok');
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  }, []);

  useEffect(() => {
    fetchPredictions();
    const interval = setInterval(fetchPredictions, REFRESH_INTERVAL);
    return () => clearInterval(interval);
  }, [fetchPredictions]);

  useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const map = L.map(mapRef.current, {
      center: [41.88, -87.69],
      zoom: 11,
      zoomControl: true,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      maxZoom: 19,
    }).addTo(map);
    mapInstanceRef.current = map;

    STATIONS.forEach(station => {
      const marker = L.circleMarker([station.lat, station.lon], {
        radius: 7,
        fillColor: '#334155',
        color: '#1e293b',
        weight: 1.5,
        opacity: 1,
        fillOpacity: 0.9,
      }).addTo(map);
      marker.bindTooltip(station.name, { permanent: false, direction: 'top', className: 'station-tooltip' });
      marker.on('click', () => setSelectedStation(station.id));
      markersRef.current[station.id] = marker;
    });
  }, []);

  useEffect(() => {
    Object.entries(markersRef.current).forEach(([id, marker]) => {
      const prob = predictions[parseInt(id)];
      const color = probColor(prob);
      const isSelected = parseInt(id) === selectedStation;
      marker.setStyle({
        fillColor: color,
        color: isSelected ? '#fff' : '#1e293b',
        weight: isSelected ? 3 : 1.5,
        radius: isSelected ? 10 : 7,
        fillOpacity: 0.9,
      });
    });
  }, [predictions, selectedStation]);

  const sortedStations = [...STATIONS].sort((a, b) => {
    const pa = predictions[a.id] ?? -1;
    const pb = predictions[b.id] ?? -1;
    return pb - pa;
  });

  const highRiskCount = Object.values(predictions).filter(p => p >= 0.6).length;
  const midRiskCount = Object.values(predictions).filter(p => p >= 0.3 && p < 0.6).length;
  const lowRiskCount = Object.values(predictions).filter(p => p < 0.3).length;

  const selected = selectedStation ? STATIONS.find(s => s.id === selectedStation) : null;
  const selectedProb = selectedStation ? predictions[selectedStation] : null;

  return (
    <div id="root">
      <div className="header">
        <div className="header-left">
          <div className="logo">Delay<span>dar</span></div>
          <div className="tagline">CTA L Delay Propagation · Temporal GNN</div>
        </div>
        <div className="header-right">
          <div className={`status-pill`}>
            <div className={`status-dot ${status === 'loading' ? 'loading' : status === 'error' ? 'error' : ''}`} />
            {status === 'loading' ? 'Fetching predictions…' : status === 'error' ? 'API unreachable' : 'Live predictions'}
          </div>
          <button className="refresh-btn" onClick={fetchPredictions}>↻ Refresh</button>
        </div>
      </div>

      <div className="main">
        <div className="sidebar">
          <div className="sidebar-header">
            {selected ? `${selected.name}` : `Stations (${STATIONS.length})`}
          </div>

          {selected && (
            <div style={{padding:'12px 16px', borderBottom:'1px solid #1e2d4a'}}>
              <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>Station ID</div>
              <div style={{fontSize:13,color:'#cbd5e1',marginBottom:8}}>{selected.id}</div>
              <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>Delay probability</div>
              <div style={{fontSize:28,fontWeight:700,color: probColor(selectedProb)}}>
                {selectedProb !== undefined && selectedProb !== null ? `${(selectedProb*100).toFixed(1)}%` : '—'}
              </div>
              <div style={{fontSize:11,color:'#475569',marginTop:4}}>
                {selectedProb >= 0.6 ? '⚠ High risk of delay' : selectedProb >= 0.3 ? '~ Moderate risk' : '✓ Likely on time'}
              </div>
              <button onClick={() => setSelectedStation(null)} style={{marginTop:10,fontSize:11,color:'#475569',background:'none',border:'1px solid #1e2d4a',borderRadius:4,padding:'3px 8px',cursor:'pointer'}}>
                ← All stations
              </button>
            </div>
          )}

          <div className="sidebar-content">
            {sortedStations.map(station => {
              const prob = predictions[station.id];
              return (
                <div
                  key={station.id}
                  className={`station-card ${selectedStation === station.id ? 'selected' : ''}`}
                  onClick={() => {
                    setSelectedStation(station.id);
                    const m = markersRef.current[station.id];
                    if (m && mapInstanceRef.current) {
                      mapInstanceRef.current.setView(m.getLatLng(), 14);
                    }
                  }}
                >
                  <div>
                    <div className="station-name">{station.name}</div>
                    <div className="station-id">{station.id}</div>
                  </div>
                  {prob !== undefined ? (
                    <div className={`prob-badge ${probClass(prob)}`}>{(prob*100).toFixed(0)}%</div>
                  ) : (
                    <div style={{fontSize:12,color:'#334155'}}>—</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        <div className="map-container">
          <div id="map" ref={mapRef} />

          <div className="map-overlay">
            <div className="legend-title">Delay risk</div>
            <div className="legend-item"><div className="legend-dot" style={{background:'#22c55e'}} />Low (&lt;30%)</div>
            <div className="legend-item"><div className="legend-dot" style={{background:'#f59e0b'}} />Medium (30–60%)</div>
            <div className="legend-item"><div className="legend-dot" style={{background:'#ef4444'}} />High (&gt;60%)</div>
          </div>

          {lastUpdated && (
            <div className="last-updated">
              Last updated {lastUpdated.toLocaleTimeString()} · auto-refresh every 2 min
            </div>
          )}

          {error && (
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:999,background:'#1a0a0a',border:'1px solid #7f1d1d',borderRadius:10,padding:'16px 24px',textAlign:'center',color:'#fca5a5',fontSize:13}}>
              <div style={{fontWeight:600,marginBottom:4}}>Could not reach API</div>
              <div style={{color:'#94a3b8',fontSize:12}}>Make sure uvicorn is running on port 8000</div>
            </div>
          )}
        </div>
      </div>

      <div className="stats-bar">
        <div className="stat">
          <span className="stat-label">Stations monitored</span>
          <span className="stat-value">{STATIONS.length}</span>
        </div>
        <div className="stat">
          <span className="stat-label">High risk</span>
          <span className={`stat-value ${highRiskCount > 0 ? 'danger' : 'success'}`}>{highRiskCount}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Moderate risk</span>
          <span className={`stat-value ${midRiskCount > 5 ? 'warning' : ''}`}>{midRiskCount}</span>
        </div>
        <div className="stat">
          <span className="stat-label">On time</span>
          <span className="stat-value success">{lowRiskCount}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Model</span>
          <span className="stat-value" style={{fontSize:12,color:'#64748b'}}>GCNConv + GRU · AUC 0.91</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<style>
.station-tooltip { background: #0d1526 !important; border: 1px solid #1e3a4a !important; color: #e2e8f0 !important; font-size: 12px !important; box-shadow: none !important; }
.leaflet-tooltip-top:before { border-top-color: #1e3a4a !important; }
</style>
</body>
</html>
